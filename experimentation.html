// Write a program that capitalizes every other letter (even or odd letters) in words in the string.  //


        var myText2 = "apple banana orange strawberry kiwi watermelon blueberry";
        var newString2 = "";
        
        
for (var i = 0; i < myText2.length; i++) {
    if (i % 2 === 0) {
        newString2 += myText2[i].toUpperCase();
    } else {
        newString2 += myText2[i].toLowerCase();
    }
}
