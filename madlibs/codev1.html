<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Madlibs</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Jacques+Francois&family=New+Rocker&display=swap" rel="stylesheet">

  <link rel="stylesheet" 
  href="madlibsstyles.css">

  <script src="script.js" defer></script>
</head>

<body>

<main class="layout">


  <section class="scroll-section">

    <div class="scroll-content">

      <h1>The Tale of Princess Kate</h1>

      <form id="madlibs">

        <input type="text" id="noun1" placeholder="Noun">
        <input type="text" id="adj1" placeholder="Adjective">
        <input type="text" id="noun2" placeholder="Plural Noun">
        <input type="text" id="creature1" placeholder="Creature">

        <input type="text" id="creature2" placeholder="Creature">
        <input type="text" id="noun3" placeholder="Noun">
        <input type="text" id="adverb" placeholder="Adverb">
        <input type="text" id="weapon" placeholder="Weapon">

        <input type="text" id="verb1" placeholder="Verb">
        <input type="text" id="food1" placeholder="Food">
        <input type="text" id="food2" placeholder="Food">
        <input type="text" id="singer" placeholder="Singer">

        <button type="submit">Create Story</button>
      </form>

      <article id="result"></article>

    </div>

  </section>


  <section class="princess-section">
    <img src="images/princesskate.png" class="princess" alt="Princess Kate">
  </section>

</main>

</body>
</html>
